<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>干瞪眼计分器 Pro Max+</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --win-color: #ff85a2; 
            --skip-color: #a8e6cf; 
            --gray-btn: #efefef;
            --border-color: #d0d0d0;
            --pos-color: #e53935; 
            --neg-color: #43a047; 
            --nav-height: 80px;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            background-color: var(--bg-color);
            height: 100dvh; display: flex; flex-direction: column;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        .page-container { flex: 1; display: none; flex-direction: column; overflow: hidden; position: relative; }
        .page-container.active { display: flex; }

        .table-wrapper { flex: 1; overflow: auto; background: white; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #eee; text-align: center; padding: 15px 5px; min-width: 70px; }
        .fixed-left { position: sticky; left: 0; z-index: 10; background: white; border-right: 2px solid #f0f0f0; }
        .fixed-right { position: sticky; right: 0; z-index: 10; background: white; border-left: 2px solid #f0f0f0; }
        
        .name-link { text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 5px; font-weight: 900; color: #333; }
        .paused-name { background-color: #ffcdd2 !important; color: #b71c1c; text-decoration-color: #b71c1c; }
        .score-red { color: var(--pos-color); font-weight: bold; }
        .score-green { color: var(--neg-color); font-weight: bold; }

        .bottom-sticky-group {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
            display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
        }

        .action-bar {
            display: flex; gap: 8px; padding: 10px 12px;
            background: rgba(252, 252, 252, 0.95);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            border-bottom: 1px solid var(--border-color);
        }

        .btn-tool {
            height: 44px; border-radius: 22px; border: none; color: white;
            font-size: 14px; font-weight: bold; flex: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-add { background: #222; flex: 1.5; font-size: 16px; }
        .btn-undo { background: #673ab7; }
        .btn-reset { background: #ff9800; }
        .btn-help { background: #00bcd4; max-width: 50px; font-size: 20px; }

        .nav-tabs { height: 75px; display: flex; background: white; border-top: 1px solid #ccc; }
        .nav-tab {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 900; color: #bbb;
        }
        .nav-tab.active { color: #000; background: #fdfdfd; transform: scale(1.1); }

        .scoring-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .player-identity { font-size: 32px; font-weight: bold; border-bottom: 4px solid #333; }
        .circle-group { display: flex; gap: 15px; }
        .circle-btn { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 18px; position: relative; transition: 0.3s; }
        .btn-win { background-color: var(--win-color); }
        .btn-win::after { content: '👑'; position: absolute; top: -12px; right: -6px; font-size: 26px; transform: rotate(15deg); }
        
        .win-highlight { transform: scale(1.15); box-shadow: 0 0 15px var(--win-color); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-skip { background-color: var(--skip-color); color: #2d5a27; }
        .lcd-display { background-color: #333; color: #00ff41; font-family: 'Courier New', monospace; font-size: 50px; text-align: right; padding: 15px 25px; margin: 10px 20px; border-radius: 12px; min-height: 60px; box-shadow: inset 0 2px 10px #000; }
        .multiplier-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 15px 20px; }
        .btn-oval { min-width: 75px; padding: 12px 0; border-radius: 25px; border: none; background: var(--gray-btn); font-weight: bold; font-size: 16px; flex-shrink: 0; }
        .btn-oval.active { background: #333; color: white; }
        .card-grid { padding: 10px 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .btn-rect { padding: 22px 0; background: white; border: 1px solid #ddd; border-radius: 12px; font-size: 28px; font-weight: bold; }
        .footer-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .btn-huge { padding: 20px; border-radius: 40px; border: none; font-size: 22px; font-weight: bold; color: white; }
        .btn-back { background-color: #666; }
        .btn-done { background-color: #2e7d32; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; padding: 40px 20px; overflow-y: auto; }
        .modal-content { background: white; border-radius: 25px; padding: 30px; }
        
        /* 预览弹窗样式 */
        .preview-list { list-style: none; padding: 0; margin: 20px 0; }
        .preview-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 18px; }
        .preview-score-pos { color: var(--pos-color); font-weight: bold; }
        .preview-score-neg { color: var(--neg-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="page-stats" class="page-container active">
        <div class="table-wrapper">
            <table id="stats-table"></table>
        </div>
    </div>

    <div id="page-score" class="page-container">
        <div class="scoring-header">
            <div id="cur-player-name" class="player-identity">姓名</div>
            <div class="circle-group">
                <button id="win-btn" class="circle-btn btn-win" onclick="handleWin()">赢</button>
                <button class="circle-btn btn-skip" onclick="handleSkip()">跳</button>
            </div>
        </div>
        <div class="multiplier-scroll">
            <button class="btn-oval" onclick="setM(2)">2x</button>
            <button class="btn-oval" onclick="setM(4)">4x</button>
            <button class="btn-oval" onclick="setM(8)">8x</button>
            <button class="btn-oval" onclick="setM(16)">16x</button>
            <button class="btn-oval" onclick="setM(32)">32x</button>
            <button class="btn-oval" onclick="setM(64)">64x</button>
        </div>
        <div id="lcd" class="lcd-display">0</div>
        <div class="card-grid">
            <button class="btn-rect" onclick="setC(1)">1</button>
            <button class="btn-rect" onclick="setC(2)">2</button>
            <button class="btn-rect" onclick="setC(3)">3</button>
            <button class="btn-rect" onclick="setC(4)">4</button>
            <button class="btn-rect" onclick="setC(5)">5</button>
        </div>
        <div class="footer-actions">
            <button id="score-back-btn" class="btn-huge btn-back">BACK</button>
            <button class="btn-huge btn-done" onclick="handleDone()">DONE</button>
        </div>
    </div>

    <div class="bottom-sticky-group">
        <div class="action-bar" id="stats-tools">
            <button class="btn-tool btn-add" onclick="doAddPlayer()">+ 添加人员</button>
            <button class="btn-tool btn-undo" id="undo-btn" style="display:none;" onclick="undoLastRound()">撤销</button>
            <button class="btn-tool btn-reset" id="reset-btn">全新牌局</button>
            <button class="btn-tool btn-help" id="help-btn" onclick="showGuide()">?</button>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-stats" onclick="goPage('stats')">统计</div>
            <div class="nav-tab" id="tab-score" onclick="goPage('score')">计分</div>
        </div>
    </div>

    <div id="guide-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">📖 使用指南</h3>
            <ul style="padding-left:20px; line-height:1.8">
                <li><b>人员管理</b>：点击“+添加人员”。短按姓名切换暂停（红底），长按姓名删除（重置全局）。</li>
                <li><b>计分原则</b>：只需录入“输家”和“跳过者”，赢家分数由系统自动算出。</li>
                <li><b>输家录入</b>：先点倍率（如2x），再点牌数（如5），点 <b>DONE</b> 确认名次。</li>
                <li><b>BACK 键</b>：短按清除当前数字（LCD归零），长按回退录入上一位玩家。</li>
                <li><b>其它操作</b>：点“撤销”删除上一局；长按“全新牌局”彻底重置；点击“?”查看指南。</li>
            </ul>
            <button style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:12px; font-weight:bold" onclick="closeGuide()">我知道了！</button>
        </div>
    </div>

    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">📊 本回合得分预览</h3>
            <div id="preview-body" class="preview-list"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;">
                <button style="padding:15px; background:#666; color:white; border:none; border-radius:12px; font-weight:bold;" onclick="closePreview()">重新计分</button>
                <button style="padding:15px; background:#2e7d32; color:white; border:none; border-radius:12px; font-weight:bold;" onclick="commitRound()">确定</button>
            </div>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('gdy_v18_players')) || [];
        let rounds = JSON.parse(localStorage.getItem('gdy_v18_rounds')) || [];
        let state = { currentIdx: 0, activeOrder: [], results: {}, winIdx: -1, m: 1, c: 0 };

        window.onload = () => {
            if (!localStorage.getItem('gdy_v18_guided')) showGuide();
            renderTable();
            setLongPress('reset-btn', () => {
                if(confirm("确定清空数据开启新局？")) { players = []; rounds = []; saveData(); renderTable(); }
            });
            setLongPress('score-back-btn', () => {
                if (state.currentIdx > 0) {
                    state.currentIdx--;
                    if (state.activeOrder[state.currentIdx] === state.winIdx) state.winIdx = -1;
                    resetCalc(); refreshScoringUI();
                } else { alert("第一位玩家"); }
            }, true);
        };

        function showGuide() { document.getElementById('guide-modal').style.display = 'block'; }
        function closeGuide() { document.getElementById('guide-modal').style.display = 'none'; localStorage.setItem('gdy_v18_guided', 'true'); }
        function showPreview() { document.getElementById('preview-modal').style.display = 'block'; }
        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; initScoring(state.activeOrder); }

        function setLongPress(id, longCallback, hasShortLogic = false) {
            let timer; const el = document.getElementById(id);
            let isLong = false;
            const start = () => { isLong = false; timer = setTimeout(() => { isLong = true; longCallback(); }, 800); };
            const end = (e) => { clearTimeout(timer); if (!isLong && hasShortLogic && e.type.includes('touchend')) { if (id === 'score-back-btn') { resetCalc(); refreshScoringUI(); } } };
            el.addEventListener('touchstart', start, {passive: true}); el.addEventListener('touchend', end, {passive: true});
            el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
        }

        function doAddPlayer() {
            if (players.length >= 8) return alert("已达8人上限");
            let n = prompt("输入姓名:");
            if (!n) return;
            n = n.trim();
            if (players.some(p => p.name === n)) return alert("姓名重复");
            players.push({ name: n, paused: false }); saveData(); renderTable();
        }

        function delP(i) {
            if(confirm("确定删除？历史计分将清空！")) { players.splice(i, 1); rounds = []; saveData(); renderTable(); }
        }

        function undoLastRound() { if (rounds.length > 0 && confirm("撤销计分？")) { rounds.pop(); saveData(); renderTable(); } }

        function renderTable() {
            const table = document.getElementById('stats-table');
            document.getElementById('undo-btn').style.display = rounds.length > 0 ? 'flex' : 'none';
            let head = `<tr><th class="fixed-left">姓名</th>`;
            rounds.forEach((_, i) => head += `<th>${i+1}</th>`);
            head += `<th class="fixed-right">总计</th></tr>`;
            let body = players.map((p, pIdx) => {
                let total = 0;
                let row = `<td class="fixed-left ${p.paused?'paused-name':''}" onclick="toggleP(${pIdx})" oncontextmenu="delP(${pIdx});return false;"><span class="name-link">${p.name}</span></td>`;
                rounds.forEach(r => { let s = r[pIdx] || 0; total += s; row += `<td>${s === 0 ? '-' : (s > 0 ? '+'+s : s)}</td>`; });
                row += `<td class="fixed-right ${total > 0 ? 'score-red' : (total < 0 ? 'score-green' : '')}">${total}</td>`;
                return `<tr>${row}</tr>`;
            }).join('');
            table.innerHTML = head + body;
        }

        function toggleP(i) { players[i].paused = !players[i].paused; saveData(); renderTable(); }
        function saveData() { localStorage.setItem('gdy_v18_players', JSON.stringify(players)); localStorage.setItem('gdy_v18_rounds', JSON.stringify(rounds)); }

        function goPage(p) {
            document.getElementById('stats-tools').style.display = (p === 'stats') ? 'flex' : 'none';
            document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            if (p === 'stats') {
                document.getElementById('page-stats').classList.add('active');
                document.getElementById('tab-stats').classList.add('active');
                renderTable();
            } else {
                let actives = players.map((p,i)=>i).filter(i=>!players[i].paused);
                if (actives.length < 2) return goPage('stats');
                document.getElementById('page-score').classList.add('active');
                document.getElementById('tab-score').classList.add('active');
                initScoring(actives);
            }
        }

        function initScoring(order) { state.activeOrder = order; state.currentIdx = 0; state.results = {}; state.winIdx = -1; resetCalc(); refreshScoringUI(); }
        
        function refreshScoringUI() {
            let p = players[state.activeOrder[state.currentIdx]];
            document.getElementById('cur-player-name').innerText = p.name;
            let val = state.m * state.c;
            document.getElementById('lcd').innerText = val === 0 ? "0" : "-" + val;
            document.querySelectorAll('.btn-oval').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === state.m));
            const isLast = state.currentIdx === state.activeOrder.length - 1;
            document.getElementById('win-btn').classList.toggle('win-highlight', isLast && state.winIdx === -1);
        }

        function setM(v) { state.m = state.m === v ? 1 : v; refreshScoringUI(); }
        function setC(v) { state.c = v; refreshScoringUI(); }
        function resetCalc() { state.m = 1; state.c = 0; }

        function handleWin() {
            if (state.winIdx !== -1 && state.winIdx !== state.activeOrder[state.currentIdx]) {
                if (confirm("冲突：重新计分？")) initScoring(state.activeOrder);
                return;
            }
            state.winIdx = state.activeOrder[state.currentIdx];
            state.results[state.winIdx] = "WIN";
            moveNext();
        }

        function handleSkip() { state.results[state.activeOrder[state.currentIdx]] = 0; moveNext(); }

        function handleDone() { 
            if (state.activeOrder[state.currentIdx] === state.winIdx) return moveNext();
            if (state.c === 0) return alert("选牌数");
            state.results[state.activeOrder[state.currentIdx]] = -(state.m * state.c);
            moveNext(); 
        }

        function moveNext() {
            if (state.currentIdx < state.activeOrder.length - 1) { 
                state.currentIdx++; resetCalc(); refreshScoringUI(); 
            } else {
                if (state.winIdx === -1) {
                    if (confirm("无赢家：重新计分？")) initScoring(state.activeOrder);
                    return;
                }
                buildPreview();
                showPreview();
            }
        }

        function buildPreview() {
            const body = document.getElementById('preview-body');
            let sumNeg = 0;
            let listHtml = "";
            state.activeOrder.forEach(idx => {
                let score = state.results[idx];
                if (typeof score === 'number') sumNeg += Math.abs(score);
            });
            state.activeOrder.forEach(idx => {
                let score = state.results[idx] === "WIN" ? sumNeg : state.results[idx];
                let colorClass = score >= 0 ? 'preview-score-pos' : 'preview-score-neg';
                listHtml += `<div class="preview-item"><span>${players[idx].name}</span><span class="${colorClass}">${score > 0 ? '+'+score : score}</span></div>`;
            });
            body.innerHTML = listHtml;
            // 将赢家的实际分数暂存到结果中供 commitRound 使用
            state.finalRoundData = {};
            players.forEach((_, i) => {
                let score = state.results[i];
                state.finalRoundData[i] = (score === "WIN") ? sumNeg : (score || 0);
            });
        }

        function commitRound() {
            rounds.push(state.finalRoundData);
            document.getElementById('preview-modal').style.display = 'none';
            saveData(); goPage('stats');
        }
    </script>
</body>
</html>
